<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Polese Barbershop monogramma FP">
  <defs>
    <linearGradient id="fpGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E6D5A8"/>
      <stop offset="50%" stop-color="#C9A962"/>
      <stop offset="100%" stop-color="#9A7B43"/>
    </linearGradient>
    <linearGradient id="fpRing" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E6D5A8"/>
      <stop offset="100%" stop-color="#9A7B43"/>
    </linearGradient>
  </defs>

  <!-- Sfondo tondo per contrasto -->
  <circle cx="60" cy="60" r="56" fill="#111111"/>
  <circle cx="60" cy="60" r="56" fill="none" stroke="url(#fpRing)" stroke-width="2.5"/>
  <circle cx="60" cy="60" r="50" fill="none" stroke="#FAFAFA" stroke-width="0.75" opacity="0.15"/>

  <!-- Monogramma FP -->
  <text x="60" y="68" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="700" letter-spacing="-2" fill="#FAFAFA">FP</text>

  <!-- Forbici -->
  <g transform="translate(22, 82) rotate(-22)" stroke="#FAFAFA" stroke-width="1.8" stroke-linecap="round" fill="none">
    <circle cx="5" cy="5" r="4"/>
    <circle cx="17" cy="5" r="4"/>
    <path d="M7 7 L19 19 M15 7 L3 19"/>
  </g>

  <!-- Rasoio -->
  <g transform="translate(76, 80) rotate(18)" fill="none" stroke="url(#fpGold)" stroke-width="1.8" stroke-linecap="round">
    <path d="M0 10 Q14 0 28 10 L34 12 L28 14 Q14 4 0 14 Z"/>
    <path d="M34 12 L40 12"/>
  </g>

  <!-- Macchinetta -->
  <g transform="translate(50, 92)" fill="none" stroke="#FAFAFA" stroke-width="1.4" stroke-linecap="round">
    <rect x="0" y="0" width="20" height="12" rx="2.5"/>
    <path d="M4 3.5v5M8 3.5v5M12 3.5v5M16 3.5v5"/>
    <path d="M10 12v5"/>
  </g>
</svg>
